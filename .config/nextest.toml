[profile.ci]
failure-output = "immediate"
fail-fast = false
slow-timeout = { period = "30s", terminate-after = 3 }
# test-threads unset → use nextest's default (num_cpus, 4 on
# ubuntu-latest). Previously pinned to 1 in commit d97cd13's "minor"
# section without a documented rationale; nextest runs each test in
# its own process so there's no shared state to serialise. See
# 2026-05-02 perf-audit conversation.

# `partition_strategy_scoreboard` runs Pool/P1/P2 across 2 cases —
# baseline ~50s locally in debug mode. CI has been variable, with
# observed runtimes from 200s to 480s+; give it a 6-minute ceiling
# to stay clear of intermittent slowness without hiding real timeouts.
# The slow-tail extended corpus lives in
# `partition_strategy_scoreboard_extended` and is `#[ignore]`d.
[[profile.ci.overrides]]
filter = "test(partition_strategy_scoreboard)"
slow-timeout = { period = "60s", terminate-after = 6 }

# `tier5_processing_unit_2s_horizontal_stack_iron_ore_pipe_bypass`
# runs the horizontal-stack PU layout end-to-end. ~29s in release,
# >90s in debug, and the author's `#[ntest::timeout(180000)]` is a
# 3-min ceiling — so the test is known-slow under debug. Give
# nextest 4 minutes to complete (at the ntest ceiling + slack) so
# the slow-timeout doesn't kill it before the test's own ceiling
# catches genuine hangs.
[[profile.ci.overrides]]
filter = "test(tier5_processing_unit_2s_horizontal_stack_iron_ore_pipe_bypass)"
slow-timeout = { period = "60s", terminate-after = 4 }

# `stress_advanced_circuit_partitioned_7s_from_plates` runs Pooled +
# PartitionedPerConsumer layouts at AC@7/s with auto-tier (eviction
# strategy active). Local debug: ~96s on main, ~191s with the layout
# retry pipeline (PR #252). Both exceed the default 90s slow-timeout.
# Give it a 5-minute ceiling to stay clear of CI variance without
# hiding genuine hangs.
[[profile.ci.overrides]]
filter = "test(stress_advanced_circuit_partitioned_7s_from_plates)"
slow-timeout = { period = "60s", terminate-after = 5 }

[profile.ci.junit]
path = "junit.xml"
store-success-output = true
