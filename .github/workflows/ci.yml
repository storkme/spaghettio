name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
            web:
              - 'web/**'

  rust:
    needs: changes
    if: always() && needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: cargo nextest run -p fucktorio_core --profile ci
      - run: cargo clippy -p fucktorio_core -- -D warnings
      - name: Generate test summary
        if: always()
        run: |
          python3 - <<'PYEOF'
          import xml.etree.ElementTree as ET, os
          path = "target/nextest/ci/junit.xml"
          if not os.path.exists(path):
              print("No JUnit XML found"); exit(0)
          tree = ET.parse(path)
          root = tree.getroot()
          total = int(root.get("tests", 0))
          failures = int(root.get("failures", 0))
          errors = int(root.get("errors", 0))
          time = root.get("time", "?")

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write("### Rust Test Results\n\n")
              f.write(f"**{total}** tests | **{total - failures - errors}** passed | **{failures}** failed | **{time}s**\n\n")
              f.write("| Test | Status | Duration |\n|------|--------|----------|\n")
              for ts in root.iter("testsuite"):
                  for tc in ts.iter("testcase"):
                      name = tc.get("name", "?")
                      t = tc.get("time", "0")
                      fail = tc.find("failure")
                      if fail is not None:
                          f.write(f"| {name} | :x: FAIL | {t}s |\n")
                      else:
                          skip = tc.find("skipped")
                          if skip is not None:
                              f.write(f"| {name} | :zzz: SKIP | {t}s |\n")
                          else:
                              f.write(f"| {name} | :white_check_mark: | {t}s |\n")
          PYEOF
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rust-test-results
          path: target/nextest/ci/junit.xml

  web:
    needs: changes
    if: always() && (needs.changes.outputs.rust == 'true' || needs.changes.outputs.web == 'true')
    runs-on: ubuntu-latest
    env:
      BASE_PATH: ${{ github.event_name == 'pull_request' && format('/fucktorio/pr-{0}/', github.event.pull_request.number) || '/fucktorio/' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM
        run: wasm-pack build crates/wasm-bindings --target web --out-dir $GITHUB_WORKSPACE/web/src/wasm-pkg
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run test
        working-directory: web
      - run: npm run build
        working-directory: web
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/

  deploy-main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: site/
      - name: Deploy to gh-pages root
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: site
          branch: gh-pages
          clean: true
          clean-exclude: |
            pr-*

  deploy-preview:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    needs: [web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: site/
      - name: Deploy preview to gh-pages/pr-${{ github.event.pull_request.number }}
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: site
          branch: gh-pages
          target-folder: pr-${{ github.event.pull_request.number }}
          clean: true
          commit-message: "Deploy preview for PR #${{ github.event.pull_request.number }} (${{ github.sha }})"
      - name: Comment preview URL on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-preview
          message: |
            Preview deployed: https://storkme.github.io/fucktorio/pr-${{ github.event.pull_request.number }}/

            Last updated: ${{ github.sha }} at ${{ github.event.pull_request.updated_at }}
