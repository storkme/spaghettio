name: Clear agent-reviewed on push

# When new commits land on a PR, drop the 'agent-reviewed' label so the
# watcher's review pickup re-reviews the new SHA on its next poll.

on:
  pull_request:
    types: [synchronize]

permissions:
  pull-requests: write

jobs:
  clear-label:
    runs-on: ubuntu-latest
    steps:
      - name: Remove agent-reviewed label
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'agent-reviewed',
              });
              core.info('removed agent-reviewed label');
            } catch (err) {
              if (err.status === 404) {
                core.info('agent-reviewed label not present; nothing to do');
                return;
              }
              throw err;
            }
