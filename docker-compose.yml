# Agent runs do NOT use compose. Use ./scripts/run-agent.sh for that.
#
# This file exists solely for the 'dev' workflow: drop into a bash shell
# inside the image to poke at the toolchain, rerun cargo/npm, inspect the
# copied ~/.pi, etc. The dev shell clones the repo on entry.
services:
  dev:
    build: .
    image: fucktorio-agent:latest
    volumes:
      - ${HOME}/.pi:/mnt/pi-ro:ro
    environment:
      GH_TOKEN: ${GH_TOKEN:-}
      AGENT_NAME: dev-shell
      ISSUE: "0"
    stdin_open: true
    tty: true
    command: bash
